<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planner Calendário Pro</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📅</text></svg>">
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'primary': '#4F46E5', // Indigo 600
                        'primary-light': '#EEF2FF', // Indigo 50
                        'secondary': '#10B981', // Emerald 500
                        'danger': '#EF4444', // Red 500
                        'warning': '#F59E0B', // Amber 500
                        'teams': '#5b5fc7',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        body { font-family: 'Inter', sans-serif; background-color: #F3F4F6; }
        
        /* Ocultar scrollbar mantendo o scroll */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        /* Animações Modal */
        .modal-enter { animation: slideInRight 0.3s ease-out forwards; }
        .modal-leave { animation: slideOutRight 0.3s ease-in forwards; }
        .backdrop-enter { animation: fadeIn 0.3s ease-out forwards; }
        .backdrop-leave { animation: fadeOut 0.3s ease-in forwards; }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        @keyframes slideOutRight {
            from { transform: translateX(0); opacity: 1; }
            to { transform: translateX(100%); opacity: 0; }
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; } }

        /* Ajustes do Grid do Calendário Mensal */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, minmax(0, 1fr));
            gap: 1px;
            background-color: #E5E7EB;
            border: 1px solid #E5E7EB;
            border-radius: 0.75rem;
            overflow: hidden;
        }
        .calendar-cell {
            background-color: white;
            min-height: 120px;
            padding: 0.5rem;
            transition: background-color 0.2s;
        }
        .calendar-cell:hover { background-color: #F9FAFB; cursor: pointer; }
        .calendar-cell.inactive { background-color: #F9FAFB; color: #9CA3AF; }
        
        @media (max-width: 640px) {
            .calendar-cell { min-height: 80px; padding: 0.25rem; }
        }
    </style>
</head>
<body class="text-gray-800 antialiased h-screen flex flex-col overflow-hidden">

    <!-- Container de Notificações (Toasts) -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-[70] flex flex-col space-y-2"></div>

    <!-- Indicador de Status Cloud -->
    <div id="loading-overlay" class="fixed inset-0 bg-white z-[60] flex flex-col items-center justify-center transition-opacity duration-300">
        <svg class="animate-spin h-10 w-10 text-primary mb-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
        <p class="font-medium text-gray-600">Conectando ao Firebase...</p>
    </div>

    <!-- TOPBAR PRINCIPAL -->
    <header class="bg-white border-b border-gray-200 px-6 py-4 flex flex-col sm:flex-row justify-between items-center shadow-sm z-10 shrink-0">
        <div class="flex items-center space-x-3">
            <div class="bg-primary text-white p-2 rounded-lg">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
            </div>
            <h1 class="text-xl font-bold text-gray-800 tracking-tight">Planner Pro</h1>
            <span id="cloud-indicator" class="ml-2 inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800 hidden">
                <span class="w-1.5 h-1.5 rounded-full bg-green-500 mr-1.5 animate-pulse"></span> Nuvem Ativa
            </span>
        </div>
    </header>

    <!-- BARRA DE FERRAMENTAS DO CALENDÁRIO (Abas e Navegação) -->
    <div class="bg-white border-b border-gray-200 px-6 py-3 flex flex-col md:flex-row justify-between items-center z-0 shrink-0 shadow-sm">
        
        <!-- Navegação Temporal (< Hoje >) -->
        <div class="flex items-center space-x-4 mb-4 md:mb-0">
            <button onclick="window.navigateTemporal(-1)" class="p-2 rounded-full hover:bg-gray-100 text-gray-600 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
            </button>
            
            <button onclick="window.goToday()" class="px-3 py-1 border border-gray-300 rounded-md text-sm font-medium text-gray-700 hover:bg-gray-50 transition">
                Hoje
            </button>

            <button onclick="window.navigateTemporal(1)" class="p-2 rounded-full hover:bg-gray-100 text-gray-600 transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
            </button>

            <!-- Label do Período -->
            <h2 id="period-label" class="text-xl font-semibold text-gray-800 w-48 text-center sm:text-left">...</h2>
        </div>

        <!-- Abas (Semana / Mês) -->
        <div class="flex bg-gray-100 p-1 rounded-lg">
            <button onclick="window.switchTab('week')" id="tab-week" class="px-4 py-1.5 rounded-md text-sm font-medium transition-colors bg-white text-primary shadow-sm">
                Semanal
            </button>
            <button onclick="window.switchTab('month')" id="tab-month" class="px-4 py-1.5 rounded-md text-sm font-medium transition-colors text-gray-600 hover:text-gray-900">
                Mensal
            </button>
        </div>
    </div>

    <!-- ÁREA PRINCIPAL -->
    <main class="flex-1 overflow-y-auto p-4 sm:p-6 no-scrollbar relative">
        <div class="max-w-7xl mx-auto h-full">
            <!-- View Semanal -->
            <div id="view-week" class="h-full flex flex-col sm:grid sm:grid-cols-7 gap-4">
                <!-- Renderizado via JS -->
            </div>

            <!-- View Mensal -->
            <div id="view-month" class="hidden h-full flex flex-col">
                <div class="grid grid-cols-7 gap-1 mb-2">
                    <div class="text-center text-xs font-semibold text-gray-500 uppercase tracking-wider py-2">Dom</div>
                    <div class="text-center text-xs font-semibold text-gray-500 uppercase tracking-wider py-2">Seg</div>
                    <div class="text-center text-xs font-semibold text-gray-500 uppercase tracking-wider py-2">Ter</div>
                    <div class="text-center text-xs font-semibold text-gray-500 uppercase tracking-wider py-2">Qua</div>
                    <div class="text-center text-xs font-semibold text-gray-500 uppercase tracking-wider py-2">Qui</div>
                    <div class="text-center text-xs font-semibold text-gray-500 uppercase tracking-wider py-2">Sex</div>
                    <div class="text-center text-xs font-semibold text-gray-500 uppercase tracking-wider py-2">Sáb</div>
                </div>
                <div id="month-grid" class="calendar-grid flex-1">
                    <!-- Renderizado via JS -->
                </div>
            </div>
        </div>
    </main>

    <!-- PAINEL LATERAL (MODAL DO DIA) -->
    <div id="daily-modal-backdrop" class="fixed inset-0 bg-gray-900 bg-opacity-50 z-[40] hidden backdrop-enter" onclick="window.closeDailyModal()"></div>
    
    <div id="daily-modal" class="fixed top-0 right-0 h-full w-full sm:w-[500px] md:w-[600px] bg-white shadow-2xl z-[50] hidden flex-col modal-enter overflow-hidden">
        <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
            <div>
                <h3 id="modal-date-title" class="text-2xl font-bold text-gray-800">Dia</h3>
                <p id="modal-date-subtitle" class="text-sm text-gray-500 font-medium mt-1">Detalhes do planejamento</p>
            </div>
            <button onclick="window.closeDailyModal()" class="p-2 text-gray-400 hover:text-danger hover:bg-red-50 rounded-full transition">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
            </button>
        </div>

        <div class="flex-1 overflow-y-auto p-6 no-scrollbar">
            <section class="mb-8">
                <div class="flex justify-between items-center mb-4">
                    <h4 class="text-lg font-semibold text-gray-800 border-l-4 border-primary pl-2">Tarefas Principais</h4>
                </div>
                <div id="modal-task-list" class="space-y-3"></div>
            </section>
            <section class="mb-8">
                <h4 class="text-lg font-semibold text-gray-800 mb-4 border-l-4 border-secondary pl-2">Desdobramentos (3 Etapas + Alvo)</h4>
                <div id="modal-substep-list" class="space-y-6"></div>
            </section>
            <section class="mb-6">
                <h4 class="text-lg font-semibold text-gray-800 mb-4 border-l-4 border-warning pl-2">Observações do Dia</h4>
                <textarea id="modal-notes" rows="4" placeholder="Aprendizados, reuniões ou pendências..." class="w-full p-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary text-sm text-gray-700 resize-none outline-none transition"></textarea>
            </section>
        </div>

        <div class="p-4 border-t border-gray-200 bg-gray-50 flex justify-end space-x-3 shrink-0">
            <button onclick="window.closeDailyModal()" class="px-5 py-2 text-gray-600 bg-white border border-gray-300 rounded-lg hover:bg-gray-50 font-medium transition">Cancelar</button>
            <button onclick="window.saveDayData()" class="px-5 py-2 bg-primary text-white rounded-lg hover:bg-indigo-700 font-medium transition shadow-sm flex items-center">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" /></svg>
                Salvar Alterações
            </button>
        </div>
    </div>


    <!-- SCRIPT PRINCIPAL E FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-analytics.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Ambiente e Firebase (Sua configuração personalizada)
        const firebaseConfig = {
            apiKey: "AIzaSyALkPXI_H0I4wS9moeKZdDd2el-wGLa3fg",
            authDomain: "planner-diario-581be.firebaseapp.com",
            projectId: "planner-diario-581be",
            storageBucket: "planner-diario-581be.firebasestorage.app",
            messagingSenderId: "57260131917",
            appId: "1:57260131917:web:d882d63ed2149234dafe04",
            measurementId: "G-DPC3KDMVRP"
        };
        const appId = "planner-pro-v3";
        let app, auth, db, analytics, currentUser;

        // --- ESTADO DO APLICATIVO ---
        let globalPlannerData = {};
        let baseDate = new Date();
        baseDate.setHours(0,0,0,0);
        
        let currentTab = 'week';
        let selectedDateKey = null;
        let activeDailyData = null;

        const dayNamesList = ['Domingo', 'Segunda', 'Terça', 'Quarta', 'Quinta', 'Sexta', 'Sábado'];
        const monthNamesList = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        const NUM_TASKS = 5;

        // Sistema de Notificações
        window.showNotification = (message, type = 'info') => {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'error' ? 'bg-red-500' : (type === 'success' ? 'bg-green-500' : 'bg-primary');
            const icon = type === 'error' ? '⚠️' : (type === 'success' ? '✅' : 'ℹ️');
            
            toast.className = `${bgColor} text-white px-4 py-3 rounded-lg shadow-lg flex items-center transition-all duration-300 transform translate-y-full opacity-0 max-w-sm`;
            toast.innerHTML = `
                <span class="mr-3 text-lg">${icon}</span>
                <span class="text-sm font-medium flex-1 leading-snug">${message}</span>
                <button onclick="this.parentElement.remove()" class="ml-3 hover:text-gray-200 text-xl font-bold">&times;</button>
            `;
            container.appendChild(toast);
            
            setTimeout(() => toast.classList.remove('translate-y-full', 'opacity-0'), 10);
            setTimeout(() => {
                toast.classList.add('translate-y-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 8000);
        };

        // Inicialização do seu Firebase
        app = initializeApp(firebaseConfig);
        analytics = getAnalytics(app);
        auth = getAuth(app);
        db = getFirestore(app);
        
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                const cloudInd = document.getElementById('cloud-indicator');
                cloudInd.classList.remove('hidden');
                cloudInd.classList.replace('bg-red-100', 'bg-green-100');
                cloudInd.classList.replace('text-red-800', 'text-green-800');
                cloudInd.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-green-500 mr-1.5 animate-pulse"></span> Nuvem Ativa';
                
                document.getElementById('loading-overlay').classList.add('hidden');
                fetchDataAndListen();
            } else {
                initAuth();
            }
        });

        async function initAuth() {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    try {
                        // Tenta usar o token customizado da plataforma
                        await signInWithCustomToken(auth, __initial_auth_token);
                    } catch (customTokenError) {
                        // O token customizado do ambiente não é válido para a configuração personalizada inserida.
                        // Fazemos fallback para login anônimo de forma amigável
                        console.warn("Token customizado do ambiente incompatível com a configuração personalizada. Tentando login anônimo...", customTokenError);
                        await signInAnonymously(auth);
                    }
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Erro na autenticação:", error);
                document.getElementById('loading-overlay').classList.add('hidden');
                
                const cloudInd = document.getElementById('cloud-indicator');
                cloudInd.classList.remove('hidden');
                cloudInd.classList.replace('bg-green-100', 'bg-red-100');
                cloudInd.classList.replace('text-green-800', 'text-red-800');
                cloudInd.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-red-500 mr-1.5"></span> Offline Local';

                if (error.code === 'auth/configuration-not-found' || error.code === 'auth/admin-restricted-operation') {
                    window.showNotification("Para usar a nuvem, você precisa ativar o 'Login Anônimo' no painel Authentication do seu projeto Firebase. O app está rodando apenas no seu navegador agora.", "error");
                } else {
                    window.showNotification("Não foi possível conectar ao Firebase. O aplicativo funcionará em modo offline local.", "error");
                }

                loadLocalData();
                renderCalendar();
            }
        }

        // --- BUSCA DE DADOS (Listener em Tempo Real) ---
        function fetchDataAndListen() {
            if (!currentUser || !db) return;
            const q = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'planner_days');
            
            onSnapshot(q, (snapshot) => {
                snapshot.forEach(doc => {
                    globalPlannerData[doc.id] = doc.data();
                });
                renderCalendar();
            }, (error) => {
                console.error("Erro ao escutar Firestore:", error);
            });
        }

        function loadLocalData() {
            try {
                globalPlannerData = JSON.parse(localStorage.getItem('dailyPlannerHistory') || '{}');
            } catch(e) { globalPlannerData = {}; }
        }

        // --- UTILITÁRIOS DE DATA ---
        function getFormattedDateKey(date) {
            return `${date.getDate().toString().padStart(2, '0')}-${(date.getMonth() + 1).toString().padStart(2, '0')}-${date.getFullYear()}`;
        }

        function parseDateKey(key) {
            const [d, m, y] = key.split('-');
            return new Date(y, m - 1, d);
        }

        function getStartOfWeek(date) {
            const d = new Date(date);
            const day = d.getDay();
            const diff = d.getDate() - day;
            return new Date(d.setDate(diff));
        }

        // --- NAVEGAÇÃO E ABAS (UI Global) ---
        window.switchTab = (tab) => {
            currentTab = tab;
            const btnWeek = document.getElementById('tab-week');
            const btnMonth = document.getElementById('tab-month');
            const viewWeek = document.getElementById('view-week');
            const viewMonth = document.getElementById('view-month');

            if (tab === 'week') {
                btnWeek.className = "px-4 py-1.5 rounded-md text-sm font-medium transition-colors bg-white text-primary shadow-sm";
                btnMonth.className = "px-4 py-1.5 rounded-md text-sm font-medium transition-colors text-gray-600 hover:text-gray-900";
                viewWeek.classList.remove('hidden');
                viewMonth.classList.add('hidden');
            } else {
                btnMonth.className = "px-4 py-1.5 rounded-md text-sm font-medium transition-colors bg-white text-primary shadow-sm";
                btnWeek.className = "px-4 py-1.5 rounded-md text-sm font-medium transition-colors text-gray-600 hover:text-gray-900";
                viewMonth.classList.remove('hidden');
                viewWeek.classList.add('hidden');
            }
            renderCalendar();
        };

        window.navigateTemporal = (direction) => {
            if (currentTab === 'week') {
                baseDate.setDate(baseDate.getDate() + (direction * 7));
            } else {
                baseDate.setMonth(baseDate.getMonth() + direction);
            }
            renderCalendar();
        };

        window.goToday = () => {
            baseDate = new Date();
            baseDate.setHours(0,0,0,0);
            renderCalendar();
        };

        // --- RENDERIZAÇÃO DO CALENDÁRIO ---
        function renderCalendar() {
            if (currentTab === 'week') renderWeekView();
            else renderMonthView();
        }

        function getDayMetrics(dateKey) {
            const data = globalPlannerData[dateKey];
            if (!data || !data.tasks) return null;
            
            const realTasks = data.tasks.filter(t => t && t.description && t.description.trim() !== '');
            if (realTasks.length === 0) return null;

            const completed = realTasks.filter(t => t.completed).length;
            return { total: realTasks.length, completed };
        }

        function renderWeekView() {
            const startOfWeek = getStartOfWeek(baseDate);
            const endOfWeek = new Date(startOfWeek);
            endOfWeek.setDate(startOfWeek.getDate() + 6);
            
            const monthStr = monthNamesList[startOfWeek.getMonth()].substring(0,3);
            const monthEndStr = monthNamesList[endOfWeek.getMonth()].substring(0,3);
            if (startOfWeek.getMonth() === endOfWeek.getMonth()) {
                document.getElementById('period-label').innerText = `${startOfWeek.getDate()} a ${endOfWeek.getDate()} de ${monthNamesList[startOfWeek.getMonth()]} ${startOfWeek.getFullYear()}`;
            } else {
                document.getElementById('period-label').innerText = `${startOfWeek.getDate()} ${monthStr} - ${endOfWeek.getDate()} ${monthEndStr}, ${endOfWeek.getFullYear()}`;
            }

            const container = document.getElementById('view-week');
            container.innerHTML = '';
            
            const todayKey = getFormattedDateKey(new Date());

            for (let i = 0; i < 7; i++) {
                const currentDateLoop = new Date(startOfWeek);
                currentDateLoop.setDate(startOfWeek.getDate() + i);
                const dateKey = getFormattedDateKey(currentDateLoop);
                const isToday = dateKey === todayKey;
                const metrics = getDayMetrics(dateKey);
                
                let columnHTML = `
                    <div onclick="window.openDailyModal('${dateKey}')" class="flex flex-col bg-white rounded-xl shadow-sm border ${isToday ? 'border-primary ring-1 ring-primary' : 'border-gray-200'} p-3 sm:p-4 hover:shadow-md transition cursor-pointer min-h-[120px] sm:min-h-0">
                        <div class="flex justify-between items-center sm:block sm:text-center mb-3">
                            <span class="text-sm font-semibold text-gray-500 uppercase">${dayNamesList[i].substring(0,3)}</span>
                            <span class="text-2xl font-bold ${isToday ? 'text-primary' : 'text-gray-800'} sm:block sm:mt-1">${currentDateLoop.getDate()}</span>
                        </div>
                        <div class="flex-1 space-y-2">
                `;

                if (metrics) {
                    const progress = Math.round((metrics.completed / metrics.total) * 100);
                    const color = metrics.completed === metrics.total ? 'bg-secondary' : 'bg-primary';
                    columnHTML += `
                        <div class="w-full bg-gray-100 rounded-full h-1.5 mb-2">
                            <div class="${color} h-1.5 rounded-full" style="width: ${progress}%"></div>
                        </div>
                        <p class="text-xs text-gray-500 font-medium">${metrics.completed} de ${metrics.total} tarefas</p>
                    `;
                    
                    const tasks = globalPlannerData[dateKey].tasks.filter(t => t && t.description).slice(0, 2);
                    tasks.forEach(t => {
                        columnHTML += `
                            <div class="text-xs truncate ${t.completed ? 'line-through text-gray-400' : 'text-gray-700'} bg-gray-50 px-2 py-1.5 rounded">
                                ${t.completed ? '✓' : '•'} ${t.description}
                            </div>
                        `;
                    });
                    if (metrics.total > 2) columnHTML += `<div class="text-xs text-gray-400 pl-1">+${metrics.total - 2} mais</div>`;
                } else {
                    columnHTML += `
                        <div class="h-full flex items-center justify-center text-gray-300">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
                        </div>
                    `;
                }

                columnHTML += `</div></div>`;
                container.insertAdjacentHTML('beforeend', columnHTML);
            }
        }

        function renderMonthView() {
            const year = baseDate.getFullYear();
            const month = baseDate.getMonth();
            
            document.getElementById('period-label').innerText = `${monthNamesList[month]} ${year}`;
            
            const firstDayOfMonth = new Date(year, month, 1);
            const lastDayOfMonth = new Date(year, month + 1, 0);
            
            const startingDayIndex = firstDayOfMonth.getDay();
            const totalDays = lastDayOfMonth.getDate();
            
            const grid = document.getElementById('month-grid');
            grid.innerHTML = '';
            
            const todayKey = getFormattedDateKey(new Date());

            for (let i = 0; i < startingDayIndex; i++) {
                grid.insertAdjacentHTML('beforeend', `<div class="calendar-cell inactive"></div>`);
            }

            for (let i = 1; i <= totalDays; i++) {
                const currentDateLoop = new Date(year, month, i);
                const dateKey = getFormattedDateKey(currentDateLoop);
                const isToday = dateKey === todayKey;
                const metrics = getDayMetrics(dateKey);
                
                let cellHTML = `
                    <div onclick="window.openDailyModal('${dateKey}')" class="calendar-cell relative flex flex-col ${isToday ? 'bg-primary-light' : ''}">
                        <div class="text-right">
                            <span class="inline-flex items-center justify-center w-6 h-6 sm:w-8 sm:h-8 text-sm font-semibold rounded-full ${isToday ? 'bg-primary text-white' : 'text-gray-700'}">
                                ${i}
                            </span>
                        </div>
                        <div class="mt-auto pt-2 flex flex-wrap gap-1 justify-end">
                `;

                if (metrics) {
                    if (metrics.completed === metrics.total) cellHTML += `<span class="w-2 h-2 rounded-full bg-secondary" title="Completo"></span>`;
                    else if (metrics.completed > 0) cellHTML += `<span class="w-2 h-2 rounded-full bg-primary" title="Em progresso"></span>`;
                    else cellHTML += `<span class="w-2 h-2 rounded-full bg-danger" title="Pendente"></span>`;
                }

                cellHTML += `</div></div>`;
                grid.insertAdjacentHTML('beforeend', cellHTML);
            }

            const remainingCells = 42 - (startingDayIndex + totalDays);
            if(remainingCells < 14) {
                for (let i = 0; i < remainingCells; i++) {
                    grid.insertAdjacentHTML('beforeend', `<div class="calendar-cell inactive"></div>`);
                }
            }
        }

        // --- LÓGICA DO MODAL DIÁRIO ---
        function createEmptyDailyData() {
            return {
                tasks: Array(NUM_TASKS).fill(null).map((_, i) => ({ id: i + 1, description: '', completed: false, priority: 'medium', substeps: ['', '', '', ''] })),
                notes: ''
            };
        }

        window.openDailyModal = (dateKey) => {
            selectedDateKey = dateKey;
            
            const existingData = globalPlannerData[dateKey];
            if (existingData) activeDailyData = JSON.parse(JSON.stringify(existingData));
            else activeDailyData = createEmptyDailyData();

            if(!activeDailyData.tasks || activeDailyData.tasks.length < NUM_TASKS) {
                const em = createEmptyDailyData();
                activeDailyData.tasks = [...(activeDailyData.tasks||[]), ...em.tasks].slice(0, NUM_TASKS);
            }

            const dateObj = parseDateKey(dateKey);
            document.getElementById('modal-date-title').innerText = `${dateObj.getDate()} de ${monthNamesList[dateObj.getMonth()]}`;
            document.getElementById('modal-date-subtitle').innerText = `${dayNamesList[dateObj.getDay()]} - ${dateObj.getFullYear()}`;

            renderModalContent();

            const backdrop = document.getElementById('daily-modal-backdrop');
            const modal = document.getElementById('daily-modal');
            backdrop.classList.remove('hidden', 'backdrop-leave');
            backdrop.classList.add('backdrop-enter');
            modal.classList.remove('hidden', 'modal-leave');
            modal.classList.add('modal-enter');
        };

        window.closeDailyModal = () => {
            const backdrop = document.getElementById('daily-modal-backdrop');
            const modal = document.getElementById('daily-modal');
            
            backdrop.classList.remove('backdrop-enter');
            backdrop.classList.add('backdrop-leave');
            modal.classList.remove('modal-enter');
            modal.classList.add('modal-leave');
            
            setTimeout(() => {
                backdrop.classList.add('hidden');
                modal.classList.add('hidden');
                activeDailyData = null;
                selectedDateKey = null;
            }, 300);
        };

        function renderModalContent() {
            const tList = document.getElementById('modal-task-list');
            const sList = document.getElementById('modal-substep-list');
            
            tList.innerHTML = '';
            sList.innerHTML = '';

            activeDailyData.tasks.forEach((task, index) => {
                tList.insertAdjacentHTML('beforeend', `
                    <div class="flex items-center space-x-2 sm:space-x-3 bg-white border border-gray-200 p-2 rounded-lg">
                        <input type="checkbox" onchange="updateTempData('completed', ${index}, this.checked)" ${task.completed ? 'checked' : ''} class="w-5 h-5 text-primary rounded cursor-pointer shrink-0">
                        <input type="text" oninput="updateTempData('description', ${index}, this.value)" value="${task.description}" placeholder="Descreva a tarefa..." class="flex-1 outline-none text-sm ${task.completed ? 'line-through text-gray-400' : 'text-gray-800'} min-w-0">
                        <select onchange="updateTempData('priority', ${index}, this.value)" class="text-xs border-none bg-gray-50 rounded px-2 py-1 outline-none cursor-pointer shrink-0">
                            <option value="high" ${task.priority==='high'?'selected':''}>Alta</option>
                            <option value="medium" ${task.priority==='medium'?'selected':''}>Média</option>
                            <option value="low" ${task.priority==='low'?'selected':''}>Baixa</option>
                        </select>
                        <button onclick="window.exportToICS(${index})" class="p-1.5 text-indigo-600 bg-indigo-50 hover:bg-indigo-600 hover:text-white rounded transition shrink-0" title="Exportar Tarefa para Calendário (.ics)">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 sm:h-5 sm:w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                        </button>
                    </div>
                `);

                if (task.description.trim() !== '') {
                    if(!task.substeps) task.substeps = ['','','',''];
                    sList.insertAdjacentHTML('beforeend', `
                        <div class="bg-gray-50 border border-gray-100 p-3 rounded-lg">
                            <p class="text-xs font-semibold text-primary mb-2">Para: ${task.description}</p>
                            <div class="grid grid-cols-2 gap-2">
                                <input type="text" oninput="updateTempSub(${index}, 0, this.value)" value="${task.substeps[0]||''}" placeholder="Passo A" class="w-full text-xs p-1.5 border border-gray-200 rounded outline-none">
                                <input type="text" oninput="updateTempSub(${index}, 1, this.value)" value="${task.substeps[1]||''}" placeholder="Passo B" class="w-full text-xs p-1.5 border border-gray-200 rounded outline-none">
                                <input type="text" oninput="updateTempSub(${index}, 2, this.value)" value="${task.substeps[2]||''}" placeholder="Passo C" class="w-full text-xs p-1.5 border border-gray-200 rounded outline-none">
                                <input type="date" onchange="updateTempSub(${index}, 3, this.value)" value="${task.substeps[3]||''}" class="w-full text-xs p-1.5 border border-gray-200 rounded outline-none text-gray-600">
                            </div>
                        </div>
                    `);
                }
            });

            const notesField = document.getElementById('modal-notes');
            notesField.value = activeDailyData.notes || '';
            notesField.oninput = (e) => { activeDailyData.notes = e.target.value; };
        }

        window.updateTempData = (field, taskIndex, value) => {
            if(!activeDailyData) return;
            activeDailyData.tasks[taskIndex][field] = value;
            
            if(field === 'description') {
                clearTimeout(window.renderTimeout);
                window.renderTimeout = setTimeout(() => {
                    const sList = document.getElementById('modal-substep-list');
                    sList.innerHTML = '';
                    activeDailyData.tasks.forEach((t, i) => {
                        if (t.description.trim() !== '') {
                            if(!t.substeps) t.substeps = ['','','',''];
                            sList.insertAdjacentHTML('beforeend', `
                                <div class="bg-gray-50 border border-gray-100 p-3 rounded-lg">
                                    <p class="text-xs font-semibold text-primary mb-2">Para: ${t.description}</p>
                                    <div class="grid grid-cols-2 gap-2">
                                        <input type="text" oninput="updateTempSub(${i}, 0, this.value)" value="${t.substeps[0]||''}" placeholder="Passo A" class="w-full text-xs p-1.5 border border-gray-200 rounded outline-none">
                                        <input type="text" oninput="updateTempSub(${i}, 1, this.value)" value="${t.substeps[1]||''}" placeholder="Passo B" class="w-full text-xs p-1.5 border border-gray-200 rounded outline-none">
                                        <input type="text" oninput="updateTempSub(${i}, 2, this.value)" value="${t.substeps[2]||''}" placeholder="Passo C" class="w-full text-xs p-1.5 border border-gray-200 rounded outline-none">
                                        <input type="date" onchange="updateTempSub(${i}, 3, this.value)" value="${t.substeps[3]||''}" class="w-full text-xs p-1.5 border border-gray-200 rounded outline-none text-gray-600">
                                    </div>
                                </div>
                            `);
                        }
                    });
                }, 1000);
            } else if (field === 'completed') {
                renderModalContent(); 
            }
        };

        window.updateTempSub = (taskIndex, subIndex, value) => {
            if(!activeDailyData) return;
            activeDailyData.tasks[taskIndex].substeps[subIndex] = value;
        };

        // --- GERAÇÃO DE ARQUIVO .ICS ---
        window.exportToICS = (taskIndex) => {
            if(!activeDailyData || !activeDailyData.tasks[taskIndex]) return;

            const task = activeDailyData.tasks[taskIndex];
            
            if(!task.description || task.description.trim() === '') {
                window.showNotification("Preencha a descrição da tarefa para exportá-la.", "warning");
                return;
            }

            // Identificar a data para o evento
            let year, month, day;
            const targetDate = task.substeps && task.substeps[3] ? task.substeps[3] : null; // YYYY-MM-DD
            
            if (targetDate) {
                [year, month, day] = targetDate.split('-');
            } else {
                [day, month, year] = selectedDateKey.split('-'); // DD-MM-YYYY
            }

            const icsDateStart = `${year}${month}${day}`;
            
            // Evento de dia inteiro precisa que o DTEND seja no dia seguinte
            const dateObj = new Date(year, month - 1, day);
            dateObj.setDate(dateObj.getDate() + 1);
            const endYear = dateObj.getFullYear();
            const endMonth = String(dateObj.getMonth() + 1).padStart(2, '0');
            const endDay = String(dateObj.getDate()).padStart(2, '0');
            const icsDateEnd = `${endYear}${endMonth}${endDay}`;

            // Formatando a descrição
            let desc = `Tarefa: ${task.description}\\n`;
            if (task.substeps) {
                if (task.substeps[0]) desc += `Passo A: ${task.substeps[0]}\\n`;
                if (task.substeps[1]) desc += `Passo B: ${task.substeps[1]}\\n`;
                if (task.substeps[2]) desc += `Passo C: ${task.substeps[2]}\\n`;
            }
            if (activeDailyData.notes && activeDailyData.notes.trim() !== '') {
                desc += `\\nObservações:\\n${activeDailyData.notes.replace(/\n/g, '\\n')}`;
            }

            const icsContent = [
                "BEGIN:VCALENDAR",
                "VERSION:2.0",
                "PRODID:-//Planner Pro//BR",
                "CALSCALE:GREGORIAN",
                "BEGIN:VEVENT",
                `DTSTART;VALUE=DATE:${icsDateStart}`,
                `DTEND;VALUE=DATE:${icsDateEnd}`,
                `SUMMARY:${task.description}`,
                `DESCRIPTION:${desc}`,
                "END:VEVENT",
                "END:VCALENDAR"
            ].join("\n");

            const blob = new Blob([icsContent], { type: 'text/calendar;charset=utf-8' });
            const link = document.createElement('a');
            link.href = window.URL.createObjectURL(blob);
            link.setAttribute('download', `Tarefa_${task.description.replace(/[^a-z0-9]/gi, '_').toLowerCase()}.ics`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            
            window.showNotification("Arquivo .ics gerado! Abra-o para adicionar ao calendário.", "success");
        };

        window.saveDayData = async () => {
            if (!selectedDateKey || !activeDailyData) return;
            
            const btn = document.querySelector('#daily-modal button.bg-primary');
            const originalText = btn.innerHTML;
            btn.innerHTML = 'Salvando...';

            try {
                globalPlannerData[selectedDateKey] = JSON.parse(JSON.stringify(activeDailyData));

                if (currentUser && db) {
                    const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'planner_days', selectedDateKey);
                    await setDoc(docRef, activeDailyData);
                }

                localStorage.setItem('dailyPlannerHistory', JSON.stringify(globalPlannerData));
                
                await processFutureReminders(activeDailyData);

                window.closeDailyModal();
                renderCalendar(); 
            } catch (error) {
                console.error("Erro ao salvar", error);
                window.showNotification("Erro ao salvar as informações.", "error");
            } finally {
                btn.innerHTML = originalText;
            }
        };

        async function processFutureReminders(dayData) {
            if (!currentUser || !db) return;

            for (const task of dayData.tasks) {
                const targetDate = task.substeps && task.substeps[3] ? task.substeps[3] : null;
                if (targetDate && task.description.trim() !== '') {
                    const parts = targetDate.split('-');
                    if(parts.length === 3) {
                        const targetKey = `${parts[2]}-${parts[1]}-${parts[0]}`;
                        if(targetKey !== selectedDateKey) {
                            try {
                                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'planner_days', targetKey);
                                let futureData = globalPlannerData[targetKey] || createEmptyDailyData();
                                
                                const reminderDesc = `(Lembrete) ${task.description}`;
                                const exists = futureData.tasks.some(t => t.description === reminderDesc);
                                
                                if (!exists) {
                                    const emptyIndex = futureData.tasks.findIndex(t => t.description.trim() === '');
                                    const newTask = { id: Date.now(), description: reminderDesc, completed: false, priority: task.priority, substeps: ['', '', '', targetDate] };
                                    
                                    if (emptyIndex !== -1) futureData.tasks[emptyIndex] = newTask;
                                    else { futureData.tasks.unshift(newTask); futureData.tasks.pop(); }
                                    
                                    await setDoc(docRef, futureData);
                                }
                            } catch(e) { console.error("Erro ao agendar", e); }
                        }
                    }
                }
            }
        }
    </script>
</body>
